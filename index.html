<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meeting Transcriber</title>
  <style>
    :root {
      --bg-color: #0d0d0f;
      --surface-color: #1c1c1e;
      --surface-highlight: #2c2c2e;
      --text-main: #f5f5f7;
      --text-muted: #86868b;
      --accent: #0a84ff;
      --danger: #ff453a;
      --success: #32d74b;
      --border-radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
      padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }
    .view.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-top: 10px;
      flex-shrink: 0;
    }
    .header h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
    .nav-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1rem;
      font-weight: 500;
      padding: 8px 0;
      cursor: pointer;
    }

    .input-group { margin-bottom: 24px; flex-shrink: 0; }
    .input-group label {
      display: block;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      width: 100%;
      background: var(--surface-color);
      border: 1px solid transparent;
      color: var(--text-main);
      padding: 16px;
      border-radius: var(--border-radius);
      font-size: 1.1rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: var(--border-radius);
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-secondary { background: var(--surface-highlight); color: var(--text-main); }
    .btn-outline-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

    .recording-status {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .recording-status:active { transform: scale(0.95); }
    .pulse-ring {
      width: 120px;
      height: 120px;
      background: rgba(255, 69, 58, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulseAnim 2s infinite;
      margin-bottom: 20px;
    }
    .pulse-core {
      width: 60px;
      height: 60px;
      background: var(--danger);
      border-radius: 50%;
    }
    @keyframes pulseAnim {
      0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.7); }
      70% { transform: scale(1.1); box-shadow: 0 0 0 30px rgba(255, 69, 58, 0); }
      100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
    }
    
    .live-transcript {
      background: var(--surface-color);
      flex: 1;
      min-height: 0;
      border-radius: var(--border-radius);
      padding: 20px;
      overflow-y: auto;
      margin-bottom: 20px;
      font-size: 1rem;
      line-height: 1.5;
    }
    .timestamp { color: var(--text-muted); font-size: 0.85em; margin-right: 8px; }

    .meeting-list { 
      list-style: none; 
      padding: 0; 
      margin: 0; 
      flex: 1; 
      min-height: 0; 
      overflow-y: auto; 
    }
    .meeting-item {
      background: var(--surface-color);
      border-radius: var(--border-radius);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meeting-item:active { background: var(--surface-highlight); }
    .meeting-info h3 { margin: 0 0 4px 0; font-size: 1.1rem; }
    .meeting-info p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }

    .detail-transcript {
      background: var(--surface-color);
      flex: 1;
      min-height: 0;
      border-radius: var(--border-radius);
      padding: 20px;
      overflow-y: auto;
      margin-bottom: 0; 
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .action-row { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 20px; 
      flex-wrap: wrap;
      flex-shrink: 0; 
    }
    .action-row .btn { flex: 1; min-width: 100px; padding: 14px; font-size: 1rem; }
    
    .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; }
  </style>
</head>
<body>

  <div id="view-home" class="view active">
    <div class="header">
      <h1>New Meeting</h1>
      <button class="nav-btn" onclick="switchView('view-list')">Past Meetings</button>
    </div>
    
    <div class="input-group">
      <label for="meetingName">Meeting Label</label>
      <input type="text" id="meetingName" placeholder="e.g., Q3 Planning Session" autocomplete="off">
    </div>

    <div style="flex: 1;"></div> 

    <button class="btn btn-primary" id="startBtn">
      Start Recording
    </button>
    <div id="homeError" style="color: var(--danger); margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
  </div>

  <div id="view-record" class="view">
    <div class="header">
      <h1 id="recordTitle">Recording...</h1>
    </div>

    <div class="recording-status" id="recordingIndicatorBtn" title="Tap to Stop">
      <div class="pulse-ring"><div class="pulse-core"></div></div>
      <div style="color: var(--danger); font-weight: 600; letter-spacing: 1px; margin-bottom: 5px;">LIVE</div>
      <div style="color: var(--text-muted); font-size: 0.8rem;">Tap to Stop & Save</div>
    </div>

    <div class="live-transcript" id="liveTranscriptBox"></div>

    <button class="btn btn-danger" id="stopBtn">
      Stop & Save
    </button>
  </div>

  <div id="view-list" class="view">
    <div class="header">
      <h1>Past Meetings</h1>
      <button class="nav-btn" onclick="switchView('view-home')">Close</button>
    </div>

    <ul class="meeting-list" id="meetingListContainer"></ul>
  </div>

  <div id="view-detail" class="view">
    <div class="header">
      <h1 id="detailTitle">Meeting</h1>
      <button class="nav-btn" onclick="switchView('view-list')">Back</button>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" id="shareBtn">Share</button>
      <button class="btn btn-secondary" id="downloadBtn">Download</button>
      <button class="btn btn-outline-danger" id="deleteBtn">Delete</button>
    </div>

    <div class="detail-transcript" id="detailTranscriptBox"></div>
  </div>

  <script>
    // --- State & DOM Elements ---
    let currentMeeting = { name: '', plainText: '', htmlText: '' };
    let isRecording = false;
    let wakeLock = null;
    let recognition;
    let activeMeetingIdForDetail = null;
    
    // NEW: Array memory system to fix the offline cascading bug
    let transcriptDataArray = [];
    let lastEventFiredTime = Date.now();

    const views = ['view-home', 'view-record', 'view-list', 'view-detail'];
    const meetingNameInput = document.getElementById('meetingName');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const recordingIndicatorBtn = document.getElementById('recordingIndicatorBtn');
    const liveTranscriptBox = document.getElementById('liveTranscriptBox');
    const homeError = document.getElementById('homeError');

    // --- View Navigation ---
    function switchView(targetViewId) {
      views.forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById(targetViewId).classList.add('active');

      if (targetViewId === 'view-list') {
        renderMeetingList();
      }
    }

    // --- Local Storage Management ---
    function getSavedMeetings() {
      const data = localStorage.getItem('transcriber_meetings');
      return data ? JSON.parse(data) : [];
    }

    function saveMeetingToStorage(meeting) {
      const meetings = getSavedMeetings();
      if (meeting.plainText.trim() !== '') {
        meetings.unshift({
          id: Date.now().toString(),
          name: meeting.name,
          date: new Date().toISOString(),
          plainText: meeting.plainText,
          htmlText: meeting.htmlText
        });
        localStorage.setItem('transcriber_meetings', JSON.stringify(meetings));
      }
    }

    function deleteMeetingFromStorage(id) {
      let meetings = getSavedMeetings();
      meetings = meetings.filter(m => m.id !== id);
      localStorage.setItem('transcriber_meetings', JSON.stringify(meetings));
      switchView('view-list');
    }

    function renderMeetingList() {
      const container = document.getElementById('meetingListContainer');
      const meetings = getSavedMeetings();
      container.innerHTML = '';

      if (meetings.length === 0) {
        container.innerHTML = '<div class="empty-state">No past meetings saved yet.</div>';
        return;
      }

      meetings.forEach(meeting => {
        const dateObj = new Date(meeting.date);
        const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        const li = document.createElement('li');
        li.className = 'meeting-item';
        li.innerHTML = `
          <div class="meeting-info">
            <h3>${meeting.name}</h3>
            <p>${dateStr}</p>
          </div>
        `;
        li.onclick = () => openMeetingDetail(meeting.id);
        container.appendChild(li);
      });
    }

    function openMeetingDetail(id) {
      const meetings = getSavedMeetings();
      const meeting = meetings.find(m => m.id === id);
      if (!meeting) return;

      activeMeetingIdForDetail = id;
      document.getElementById('detailTitle').textContent = meeting.name;
      document.getElementById('detailTranscriptBox').innerHTML = meeting.htmlText || meeting.plainText;
      
      const shareBtn = document.getElementById('shareBtn');
      if (!navigator.share) {
        shareBtn.textContent = 'Copy Text';
      } else {
        shareBtn.textContent = 'Share';
      }

      switchView('view-detail');
    }

    // --- Rendering Logic for the Cascading Fix ---
    function updateTranscriptUI() {
      let htmlOutput = '';
      let plainOutput = '';

      transcriptDataArray.forEach(item => {
        htmlOutput += `<span class="timestamp">[${item.timestamp}]</span> ${item.text}<br><br>`;
        plainOutput += `[${item.timestamp}] ${item.text}\n\n`;
      });

      currentMeeting.htmlText = htmlOutput;
      currentMeeting.plainText = plainOutput;
      
      liveTranscriptBox.innerHTML = htmlOutput;
      liveTranscriptBox.scrollTop = liveTranscriptBox.scrollHeight;
    }

    // --- Speech API Setup ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      homeError.textContent = "Your browser does not support Speech Recognition. Try Chrome or Edge.";
      startBtn.disabled = true;
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false; 
      recognition.lang = 'en-US';

      recognition.onstart = () => { 
        isRecording = true; 
        lastEventFiredTime = Date.now();
      };

      recognition.onresult = (event) => {
        let currentTime = Date.now();
        let timeSinceLastEvent = currentTime - lastEventFiredTime;
        lastEventFiredTime = currentTime;

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            let transcriptSegment = event.results[i][0].transcript.trim();
            if (!transcriptSegment) continue;

            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // SMART OFFLINE GLITCH FIX: Check if this new sentence is just a slightly longer version of the last one
            if (transcriptDataArray.length > 0 && timeSinceLastEvent < 2500) {
              let lastItem = transcriptDataArray[transcriptDataArray.length - 1];
              
              if (transcriptSegment.includes(lastItem.text) || lastItem.text.includes(transcriptSegment)) {
                // It's the cascading glitch! Overwrite the old one with the longest version.
                lastItem.text = transcriptSegment.length > lastItem.text.length ? transcriptSegment : lastItem.text;
                lastItem.timestamp = timeString; 
              } else {
                // It's a brand new sentence
                transcriptDataArray.push({ timestamp: timeString, text: transcriptSegment });
              }
            } else {
              // First sentence, or a new sentence after a long pause
              transcriptDataArray.push({ timestamp: timeString, text: transcriptSegment });
            }
          }
        }
        
        updateTranscriptUI();
      };

      recognition.onerror = (event) => {
        console.error("Speech Recognition Error:", event.error);
        if (event.error === 'not-allowed') {
          alert("Microphone access was denied.");
          stopRecordingWorkflow();
        }
      };

      recognition.onend = () => {
        if (isRecording) recognition.start();
      };
    }

    // --- Wake Lock ---
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } 
        catch (err) { console.error("Wake Lock Failed", err); }
      }
    }
    function releaseWakeLock() {
      if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
    }

    // --- Core Actions ---
    function startRecordingWorkflow() {
      const name = meetingNameInput.value.trim() || 'Untitled Meeting';
      currentMeeting = { name: name, plainText: '', htmlText: '' };
      transcriptDataArray = []; // Clear array memory for new meeting
      
      document.getElementById('recordTitle').textContent = name;
      liveTranscriptBox.innerHTML = '<div style="color:var(--text-muted); text-align:center; margin-top: 20px;">Listening... speak to see text.</div>';
      
      requestWakeLock();
      try {
        recognition.start();
        switchView('view-record');
      } catch (e) { console.error(e); }
    }

    function stopRecordingWorkflow() {
      isRecording = false;
      recognition.stop();
      releaseWakeLock();
      saveMeetingToStorage(currentMeeting);
      meetingNameInput.value = ''; 
      switchView('view-list'); 
    }

    // --- Event Listeners ---
    startBtn.addEventListener('click', startRecordingWorkflow);
    stopBtn.addEventListener('click', stopRecordingWorkflow);
    recordingIndicatorBtn.addEventListener('click', stopRecordingWorkflow);
    
    // Share logic
    document.getElementById('shareBtn').addEventListener('click', async () => {
      const meeting = getSavedMeetings().find(m => m.id === activeMeetingIdForDetail);
      if (!meeting) return;

      const shareData = {
        title: meeting.name,
        text: meeting.name + '\n\n' + meeting.plainText
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          console.log('Error sharing:', err);
        }
      } else {
        navigator.clipboard.writeText(shareData.text)
          .then(() => alert('Transcript copied to clipboard!'))
          .catch(err => alert('Failed to copy text.'));
      }
    });

    // Download logic
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const meeting = getSavedMeetings().find(m => m.id === activeMeetingIdForDetail);
      if (!meeting) return;

      const dateStr = meeting.date.split('T')[0]; 
      const filename = `${meeting.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${dateStr}.txt`;
      const blob = new Blob([meeting.plainText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    });

    // Delete logic
    document.getElementById('deleteBtn').addEventListener('click', () => {
      if(confirm("Are you sure you want to delete this transcript?")) {
        deleteMeetingFromStorage(activeMeetingIdForDetail);
      }
    });

    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible' && isRecording) {
        requestWakeLock();
      }
    });
  </script>
</body>
</html>
