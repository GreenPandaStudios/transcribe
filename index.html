<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Transcriber</title>
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --text-color: #e0e0e0;
      --text-muted: #888888;
      --primary: #bb86fc;
      --danger: #cf6679;
      --success: #03dac6;
      --border: #333333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: var(--surface-color);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-color);
      border: 1px solid var(--border);
      color: var(--text-color);
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #startBtn { background-color: var(--primary); color: #000; }
    #stopBtn { background-color: var(--danger); color: #000; }
    #downloadBtn { background-color: var(--success); color: #000; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
      margin-right: 5px;
    }

    .indicator.recording {
      background-color: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .transcript-box {
      background: var(--bg-color);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      min-height: 250px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .interim-text {
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Create Meeting</h1>
    
    <div class="form-group">
      <label for="meetingName">Meeting Label / Title</label>
      <input type="text" id="meetingName" placeholder="e.g., Q3 Planning Session" autocomplete="off">
    </div>

    <div class="controls">
      <button id="startBtn">Start Recording</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="downloadBtn" disabled>Download Transcript</button>
    </div>

    <div class="status-bar">
      <div>
        <span class="indicator" id="recordingIndicator"></span>
        <span id="statusText">Ready</span>
      </div>
      <span id="wakeLockStatus">Wake Lock: Off</span>
    </div>

    <div class="transcript-box" id="transcriptBox"></div>
  </div>

  <script>
    // Elements
    const meetingNameInput = document.getElementById('meetingName');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const transcriptBox = document.getElementById('transcriptBox');
    const statusText = document.getElementById('statusText');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const wakeLockStatus = document.getElementById('wakeLockStatus');

    // State
    let isRecording = false;
    let finalTranscript = '';
    let wakeLock = null;

    // Initialize Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (!SpeechRecognition) {
      statusText.textContent = "Error: Web Speech API is not supported in this browser. Try Chrome or Edge.";
      statusText.style.color = "var(--danger)";
      startBtn.disabled = true;
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = true; // Keep listening
      recognition.interimResults = true; // Show words as they are spoken
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        isRecording = true;
        statusText.textContent = "Listening...";
        recordingIndicator.classList.add('recording');
        startBtn.disabled = true;
        stopBtn.disabled = false;
        downloadBtn.disabled = true;
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript + ' ';
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        // Update UI: Show finalized text plus current interim text
        transcriptBox.innerHTML = finalTranscript + '<span class="interim-text">' + interimTranscript + '</span>';
        
        // Auto-scroll to bottom
        transcriptBox.scrollTop = transcriptBox.scrollHeight;
      };

      recognition.onerror = (event) => {
        console.error("Speech Recognition Error:", event.error);
        if (event.error !== 'no-speech') {
          statusText.textContent = "Error: " + event.error;
        }
      };

      recognition.onend = () => {
        // The API sometimes stops automatically (e.g., after a long pause).
        // If we didn't explicitly click "Stop", restart it.
        if (isRecording) {
          recognition.start();
        } else {
          statusText.textContent = "Stopped.";
          recordingIndicator.classList.remove('recording');
          startBtn.disabled = false;
          stopBtn.disabled = true;
          downloadBtn.disabled = finalTranscript.trim() === '';
          
          // Clean up transcript view (remove interim span)
          transcriptBox.innerHTML = finalTranscript;
        }
      };
    }

    // Wake Lock API Management
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLockStatus.textContent = "Wake Lock: Active";
          
          wakeLock.addEventListener('release', () => {
            wakeLockStatus.textContent = "Wake Lock: Off";
          });
        } catch (err) {
          console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
          wakeLockStatus.textContent = "Wake Lock: Failed";
        }
      } else {
        wakeLockStatus.textContent = "Wake Lock: Unsupported";
      }
    }

    function releaseWakeLock() {
      if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
      }
    }

    // Event Listeners
    startBtn.addEventListener('click', () => {
      finalTranscript = ''; // Reset transcript for new meeting
      transcriptBox.innerHTML = '';
      requestWakeLock();
      try {
        recognition.start();
      } catch (e) {
        // Handle case where recognition might already be started
        console.error(e);
      }
    });

    stopBtn.addEventListener('click', () => {
      isRecording = false;
      recognition.stop();
      releaseWakeLock();
    });

    downloadBtn.addEventListener('click', () => {
      const meetingName = meetingNameInput.value.trim() || 'Untitled_Meeting';
      const dateStr = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
      const filename = `${meetingName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${dateStr}.txt`;
      
      const blob = new Blob([finalTranscript], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = filename;
      
      document.body.appendChild(a);
      a.click();
      
      // Cleanup
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    });

    // Re-request wake lock if document becomes visible again while recording
    document.addEventListener('visibilitychange', async () => {
      if (wakeLock !== null && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });
  </script>
</body>
</html>
